# Namelist de ejecucion para los scripts de descarga/procesamiento CDT.
#
# Reglas:
# - Cada tarea vive en una seccion [job:nombre].
# - enabled = true/false decide si se ejecuta.
# - script puede ser un nombre dentro de scripts_descarga o una ruta relativa.
# - args sirve para parametros especificos del script.
# - Las opciones start/end/bbox/outdir/verbose se agregan automaticamente
#   si la tarea las usa. Se pueden desactivar con use_dates/use_bbox/etc.

[global]
python = python3
scripts_dir = scripts_descarga
outdir = .
minlon = -75
maxlon = -70
minlat = -15
maxlat = -10
verbose = true
stop_on_error = true

[job:gpm_early_daily]
enabled = false
script = gpm_imerg_v07_to_cdt.py
start = 20200101
end = 20200103
args = --product early_daily

[job:gpm_final_daily]
enabled = false
script = gpm_imerg_v07_to_cdt.py
start = 20200101
end = 20200103
args = --product final_daily

